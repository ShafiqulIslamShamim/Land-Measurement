name: Build Android App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK & AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Restore or Create dummy google-services.json
        env:
          GOOGLE_SERVICES_JSON_SECRET: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          mkdir -p app
          if [ -n "$GOOGLE_SERVICES_JSON_SECRET" ]; then
            echo "$GOOGLE_SERVICES_JSON_SECRET" > app/google-services.json
            echo "Successfully restored google-services.json from secret."
          else
            # Create a placeholder dummy file so that the build does not fail
            echo '{"project_info":{"project_number":"1234567890","project_id":"dummy-project","storage_bucket":"dummy-project.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:1234567890:android:3b2a1a1234567890","android_client_info":{"package_name":"com.shamim.landmeasurement"}},"oauth_client":[],"api_key":[{"current_key":"dummy_api_key"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json
            echo "Created a dummy google-services.json because secret was not found."
          fi

      - name: Restore Keystore and Signing configuration (Optional)
        env:
          SIGNING_PROPERTIES: ${{ secrets.SIGNING_PROPERTIES }}
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_FILE_BASE64: ${{ secrets.STORE_FILE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p app/keystore
          
          # Decode keystore file if it is in RELEASE_KEYSTORE_BASE64 or STORE_FILE_BASE64
          KB64="$RELEASE_KEYSTORE_BASE64"
          if [ -z "$KB64" ]; then
            KB64="$STORE_FILE_BASE64"
          fi
          
          if [ -n "$KB64" ]; then
            echo "$KB64" | tr -d '\s' | base64 --decode > app/keystore/release.keystore
            echo "Decoded keystore from RELEASE_KEYSTORE_BASE64 / STORE_FILE_BASE64."
          fi
          
          # Handle signing.properties
          if [ -n "$SIGNING_PROPERTIES" ]; then
            echo "$SIGNING_PROPERTIES" > app/keystore/signing.properties
            echo "Successfully restored signing.properties from SIGNING_PROPERTIES secret."
          elif [ -n "$STORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ]; then
            KEY_PASS="$KEY_PASSWORD"
            if [ -z "$KEY_PASS" ]; then
              KEY_PASS="$STORE_PASSWORD"
            fi
            
            echo "STORE_FILE=release.keystore" > app/keystore/signing.properties
            echo "STORE_PASSWORD=$STORE_PASSWORD" >> app/keystore/signing.properties
            echo "KEY_ALIAS=$KEY_ALIAS" >> app/keystore/signing.properties
            echo "KEY_PASSWORD=$KEY_PASS" >> app/keystore/signing.properties
            echo "Successfully constructed signing.properties from individual secrets."
          else
            echo "No signing secrets provided or incomplete config. Building with default keys."
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Build Release AAB (Android App Bundle)
        run: ./gradlew bundleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload Release AAB (Bundle)
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
